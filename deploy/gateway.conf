# Frontal TCP STABLE — détenteur exclusif du port publié 8000.
#
# RAISON D'ÊTRE (défaut reproduit puis prouvé live, cf. le test de
# non-régression `test_compose_web_publishes_no_port`) :
# le broker attache le conteneur web à un réseau dédié PAR SESSION
# (`docker network connect ocular-sess-net-{id} ocular-web`), puis l'en
# détache au teardown. Or Docker **reprogramme la publication de ports du
# conteneur concerné à chaque changement de réseau** : il TUE et respawn le
# `docker-proxy` du port publié. Toute connexion en vol à travers ce port est
# coupée sans qu'un seul octet de réponse ne parte — côté client
# `curl rc=52 (Empty reply from server)` —, et le proxy renaît pointé sur
# l'IP du DERNIER réseau attaché (donc sur l'IP d'un réseau de session, qui
# disparaît à la fermeture de celle-ci -> `rc=7 connection refused`).
# `POST /sessions` tenait la connexion cliente ouverte pendant ~8-10 s
# (`_wait_session_ready`) : il se faisait donc décapiter par son PROPRE
# lancement de session, ~4 fois sur 6. La session, elle, était bel et bien
# créée -> le client perdait un `session_id` vivant, qui fuyait jusqu'à son
# TTL en immobilisant un conteneur (~4 g) et un sous-réseau du pool Docker.
#
# CORRECTIF : le port publié ne vit plus sur un conteneur que le broker
# re-câble. Ce frontal n'est JAMAIS attaché/détaché d'un réseau de session,
# donc son `docker-proxy` n'est jamais reprogrammé. Le web garde ses
# attachements dynamiques mais ne publie plus RIEN.
# Mesuré live : le trafic conteneur->conteneur (ce frontal -> web sur
# `ocular_default`) SURVIT intact à un `docker network connect` concurrent —
# seul le chemin du port publié était touché. C'est ce qui rend ce correctif
# suffisant.
#
# POURQUOI L4 (stream) ET NON UN REVERSE-PROXY HTTP : ce frontal ne doit
# ajouter AUCUNE sémantique HTTP. En pur TCP il transporte tel quel le
# WebSocket noVNC (`/sessions/{sid}/ws`), le flux `/live`, les corps de
# requête volumineux (HTML inline) et les réponses lentes (~30 s de
# `session_ready_timeout`) — aucune limite de taille, aucun buffering, aucun
# en-tête réécrit. Un frontal HTTP aurait introduit un plafond de corps, du
# buffering et une réécriture d'en-têtes, dont celle des en-têtes d'identité
# `X-Forwarded-*` du mode forward-auth (opt-in) : ici ils traversent
# inchangés, la chaîne de confiance documentée reste EXACTEMENT celle d'avant.

error_log /dev/stderr warn;
pid /tmp/nginx.pid;
worker_processes 1;

events {
    worker_connections 1024;
}

stream {
    # Résolveur DNS INTERNE de Docker. Sans lui, le nom `web` serait résolu une
    # seule fois au démarrage et gelé : un `docker compose restart web` (ou tout
    # redémarrage qui change l'IP du conteneur) laisserait ce frontal pointé sur
    # une IP morte jusqu'à son propre redémarrage. `valid=10s` + passage par une
    # variable forcent une re-résolution à l'exécution.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 8000;

        set $ocular_web "web:8000";
        proxy_pass $ocular_web;

        proxy_connect_timeout 5s;
        # Les sessions interactives tiennent un WebSocket noVNC ouvert et
        # SILENCIEUX tant que l'opérateur ne bouge ni souris ni clavier. Le
        # défaut nginx (10 m) le couperait en pleine session ; le TTL de session
        # est la seule borne qui doit compter.
        proxy_timeout 3600s;
    }
}
