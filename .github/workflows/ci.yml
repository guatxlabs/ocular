# Intégration continue — contrôle exigé par le ruleset de `main`.
#
# Actions tierces épinglées à un SHA de commit, jamais à un tag : un tag est
# MUTABLE et peut être redéplacé par le mainteneur amont vers un autre code.
# Le commentaire à côté du SHA indique la version correspondante, pour rester
# lisible sans dépendre du tag.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Le jeton par défaut ne doit rien pouvoir écrire : cette CI ne fait que lire
# le dépôt et exécuter des tests. Défini au niveau du workflow pour que TOUT
# job en hérite, y compris ceux ajoutés plus tard sans y penser.
permissions:
  contents: read

concurrency:
  # Une nouvelle poussée sur une PR annule la CI de la précédente — inutile de
  # dépenser du calcul sur du code déjà remplacé. Jamais sur `main`, dont on
  # veut l'historique de résultats complet.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit:
    name: Tests unitaires (${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Plancher déclaré dans pyproject.toml (requires-python >= 3.11) et une
        # version récente : ce sont les deux bornes qui cassent en pratique.
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false # aucun jeton ne doit rester dans .git/config

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Suite unitaire
        # `env -u REDIS_URL` : l'accesseur `redis_url()` lit REDIS_URL en repli,
        # et un test des VALEURS PAR DÉFAUT échoue si l'environnement la porte.
        # Le runner ne la pose pas aujourd'hui, mais l'expliciter empêche un
        # échec incompréhensible le jour où un service l'ajoute.
        run: env -u REDIS_URL -u OCULAR_TOKEN pytest -m "not integration" -q

      - name: Lint
        run: ruff check . --exclude web/ui/vendor

  docker:
    name: Suite dockerisée
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Suite dans l'image de test
        # Reproduit l'environnement réel d'exécution plutôt que le Python du
        # runner : c'est cette suite qui a déjà attrapé des écarts que la suite
        # unitaire ne voyait pas.
        run: make test

  licence:
    name: Conformité de licence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Les fichiers de licence des composants tiers sont présents
        # Régression déjà survenue : les en-têtes noVNC renvoyaient à un
        # LICENSE.txt qui n'était PAS distribué. La MPL-2.0 (§3.1) et la licence
        # MIT exigent que leur texte accompagne le source redistribué — une mise
        # à jour de vendor/ qui oublie le fichier de licence est un manquement.
        run: |
          set -e
          for f in COPYING \
                   THIRD-PARTY-NOTICES.md \
                   web/ui/vendor/novnc/LICENSE.txt \
                   web/ui/vendor/novnc/vendor/pako/LICENSE; do
            [ -s "$f" ] || { echo "::error file=$f::fichier de licence manquant ou vide"; exit 1; }
          done

      - name: Aucun SPDX du projet posé sur du code tiers
        # Déclarer l'AGPL sur un fichier MPL-2.0 / MIT serait une FAUSSE
        # déclaration de licence, pas une simple étourderie.
        run: |
          if grep -rl 'AGPL-3.0' web/ui/vendor/ 2>/dev/null; then
            echo "::error::un en-tête SPDX AGPL a été posé sur du code tiers"
            exit 1
          fi
