[project]
name = "ocular"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.6",
  "fastapi>=0.110",
  "uvicorn>=0.29",
  "redis>=5.0",
  "playwright>=1.41",
  "jsonschema>=4.21",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "fakeredis>=2.21", "httpx>=0.27", "ruff>=0.3", "mypy>=1.9"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-m 'not integration'"
markers = [
  "integration: requires Playwright + Chromium (playwright install chromium)",
]

[tool.ruff]
line-length = 100

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
